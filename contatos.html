<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contatos - Devtech</title>
    <link rel="stylesheet" href="asset/css/style.css">
</head>
<body>
     <nav>
        <a href="index.html">Início</a> |
        <a href="contatos.html">Cadastro</a> |
        <a href="sobre.html">eventos</a>
    </nav>
    
    <form action="obrigado.html"> <!-- troca de pagina com somente uma linha de codigo-->
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome"><br><br>
        
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>
        
        <label for="telefone">Telefone:</label><br>
        <input type="tel" id="telefone" name="telefone"><br><br>
        
        <label for="data_nascimento">Data Nascimento:</label><br>
        <input type="date" id="data_nascimento" name="data_nascimento"><br><br>
        
        <H1>Area de atuação:</H1>
        <div class="radio-group">
            <div class="radio-item">
                <input type="radio" id="estudante" name="area" value="Estudante">
                <label for="estudante">Estudante</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="desenvolvedor" name="area" value="Desenvolvedor">
                <label for="desenvolvedor">Desenvolvedor</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="profissional" name="area" value="Profissional de TI">
                <label for="profissional">Profissional de TI</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="empreendedor" name="area" value="Empreendedor">
                <label for="empreendedor">Empreendedor</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="outro" name="area" value="Outro">
                <label for="outro">Outro</label>
            </div>
        </div>

        <H1>Como ficou sabendo?:</H1>
        <div class="radio-group">
            <div class="radio-item">
                <input type="radio" id="estudante" name="area" value="Estudante">
                <label for="estudante">Instagram</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="desenvolvedor" name="area" value="Desenvolvedor">
                <label for="desenvolvedor">Faculdade/Escola</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="profissional" name="area" value="Profissional de TI">
                <label for="profissional">Amigos</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="empreendedor" name="area" value="Empreendedor">
                <label for="empreendedor">Redes Sociais</label>
            </div>
            
            <div class="radio-item">
                <input type="radio" id="outro" name="area" value="Outro">
                <label for="outro">Outro</label>
            </div>
        </div>

        <H1>Qual atividade voce tem mais interesse?</H1>
        <div class="checkbox-group">
            <div class="checkbox-item">
                <input type="checkbox" id="atividade1" name="atividade" value="atividade1">
                <label for="atividade1">Palestra sobre inteligência artificial</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="atividade2" name="atividade" value="atividade2">
                <label for="atividade2">Workshop de desenvolvimento mobile</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="atividade3" name="atividade" value="atividade3">
                <label for="atividade3">Ambos</label>
            </div>
        </div>
        
        <div style="text-align:center; margin-top:20px;">
            <button type="submit">inscrever-se</button>
        </div>
        
    </form>

   
</body>
</html>
