<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Devtech</title>
    <link rel="icon" type="image/png" href="asset/img/logo.png">
    <link rel="stylesheet" href="asset/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <nav>
        <a href="index.html">Início</a> |
        <a href="cadastro.html">Cadastro</a> |
        <a href="sobre.html">Eventos</a>
    </nav>

    <form id="cadastro-form" action="#">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email">

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone">

        <label for="data_nascimento">Data de Nascimento:</label>
        <input type="date" id="data_nascimento" name="data_nascimento">

        <h1>Área de atuação:</h1>
        <select id="area" name="area">
            <option value="">Selecionar...</option>
            <option value="Estudante">Estudante</option>
            <option value="Desenvolvedor">Desenvolvedor</option>
            <option value="Profissional de TI">Profissional de TI</option>
            <option value="Empreendedor">Empreendedor</option>
            <option value="Outro">Outro</option>
        </select>

        <h1>Como ficou sabendo?</h1>
        <div class="radio-group">
            <div class="radio-item">
                <input type="radio" id="insta" name="origem" value="Instagram">
                <label for="insta">Instagram</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="escola" name="origem" value="Faculdade/Escola">
                <label for="escola">Faculdade/Escola</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="amigos" name="origem" value="Amigos">
                <label for="amigos">Amigos</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="redes" name="origem" value="Redes Sociais">
                <label for="redes">Redes Sociais</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="outro" name="origem" value="Outro">
                <label for="outro">Outro</label>
            </div>
        </div>

        <h1>Qual atividade tem mais interesse?</h1>
        <div class="checkbox-group">
            <div class="checkbox-item">
                <input type="checkbox" id="atividade1" name="atividade" value="Palestra IA">
                <label for="atividade1">Palestra sobre IA</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="atividade2" name="atividade" value="Workshop Mobile">
                <label for="atividade2">Workshop de desenvolvimento mobile</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="atividade3" name="atividade" value="Ambos">
                <label for="atividade3">Ambos</label>
            </div>
        </div>

        <button type="button" onclick="cadastrar()">Inscrever-se</button>
        <div id="cadastro-message" class="message-confirm"></div>
    </form>

    <footer>
        DevTech 2026 • Evento tecnológico • Todos os direitos reservados •
        <a href="mailto:contato@devtech.com">contato@devtech.com</a>
    </footer>

    <script src="asset/js/script.js"></script>
</body>
</html>
