<!DOCTYPE html> 
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Cadastro - Devtech</title>
    <link rel="icon" type="image/png" href="asset/img/logo.png">
    <link rel="stylesheet" href="asset/css/style.css">
</head>
<body>

<nav>
    <a href="index.html">Início</a> |
    <a href="cadastro.html">Cadastro</a> |
    <a href="sobre.html">Eventos</a>
</nav>

<!-- 
    INTEGRAÇÃO COM FORMSPREE
    action = URL do seu formulário
    method = POST (obrigatório para envio)
-->
<form id="cadastro-form" action="https://formspree.io/f/xrejzavv" method="POST" onsubmit="cadastrar(event)">

    <!-- Campos precisam de "name" -->
    <label>Nome:</label>
    <input type="text" id="nome" name="nome" required>

    <label>Email:</label>
    <input type="email" id="email" name="email" required>

    <label>Telefone:</label>
    <input type="tel" id="telefone" name="telefone">

    <label>Data de Nascimento:</label>
    <input type="date" id="data_nascimento" name="data_nascimento">

    <h3>Área de atuação:</h3>
    <select id="area" name="area">
        <option value="">Selecionar...</option>
        <option>Estudante</option>
        <option>Desenvolvedor</option>
        <option>Profissional de TI</option>
        <option>Empreendedor</option>
        <option>Outro</option>
    </select>

    <h3>Como ficou sabendo?</h3>
    <!-- Radios precisam ter o mesmo name -->
    <label><input type="radio" name="origem" value="Instagram"> Instagram</label>
    <label><input type="radio" name="origem" value="Faculdade"> Faculdade</label>
    <label><input type="radio" name="origem" value="Amigos"> Amigos</label>

    <h3>Interesses:</h3>
    <!-- Para múltiplos valores use name="atividade[]" -->
    <label><input type="checkbox" name="atividade[]" value="IA"> Palestra IA</label>
    <label><input type="checkbox" name="atividade[]" value="Mobile"> Workshop Mobile</label>

    <label>Observações:</label>
    <textarea id="mensagem" name="mensagem"></textarea>

    <!-- 
        BOTÃO CORRETO
        type="submit" envia automaticamente para o Formspree
    -->
    <button type="submit">Inscrever-se</button>

    <div id="cadastro-message" class="message-confirm"></div>

</form>

<footer>
    DevTech 2026 • Evento tecnológico
</footer>

</body>
</html>
